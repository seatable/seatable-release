---
services:
  av:
    image: clamav/clamav:latest
    container_name: clamav
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 3G
    networks:
      - backend-seatable-net

networks:
  backend-seatable-net:
    name: backend-seatable-net
